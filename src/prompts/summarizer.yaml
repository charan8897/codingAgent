name: history_summarizer
version: "1.0"
description: "Summarizes old investigation attempts"

system: |
  You are a summarization engine. Produce dense, factual summaries
  that preserve all findings while reducing token count.

user: |
  Summarize these {attempt_count} investigation attempts.
  Focus on: what was tried, what was discovered, what was ruled out.
  Be specific about commands and their key findings.
  Maximum 3 sentences.

  Attempts:
  {attempts_text}

  Summary: